<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Viva360</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f2f7f5',
              100: '#e1ede9',
              200: '#c5dcd5',
              300: '#9ebdb6',
              400: '#769e96',
              500: '#588179', // Sage Green Base
              600: '#466962',
              700: '#3a5550',
              800: '#324643',
              900: '#2b3a38',
            },
            nature: {
              50: '#fafaf9',
              100: '#f5f5f4', // Sand/Stone
              200: '#e7e5e4',
              300: '#d6d3d1',
              400: '#a8a29e',
              500: '#78716c',
              600: '#57534e',
              700: '#44403c',
              800: '#292524',
              900: '#1c1917',
            },
            calm: '#e0f2fe',
            soothing: '#f0f9ff'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f2f7f5;
      /* primary-50 matches the light sage background */
      color: #292524;
      /* nature-800 */
      -webkit-tap-highlight-color: transparent;
    }

    /* Hide scrollbar for clean UI but allow scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- SEO Básico -->
  <title>Viva360 - Ecossistema Holístico</title>
  <meta name="description"
    content="A maior plataforma de bem-estar holístico. Conecte-se com guardiões, santuários e sua própria essência." />
  <meta name="keywords" content="holístico, yoga, reiki, bem-estar, terapias, saúde mental" />

  <!-- PWA / Mobile -->
  <meta name="application-name" content="Viva360" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Viva360" />

  <meta name="theme-color" content="#263732" />

  <style>
    :root {
      --sab: env(safe-area-inset-bottom);
      --sat: env(safe-area-inset-top);
    }

    html,
    body {
      height: 100dvh;
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f7f5;
      color: #1a211d;
      overscroll-behavior-y: contain;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #root {
      width: 100%;
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
      background-color: #f4f7f5;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    /* Splash screen inline styles */
    @keyframes splash-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes splash-pulse {

      0%,
      100% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }
    }

    .splash-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      background: #1a211d;
    }

    .splash-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #759f90;
      border-radius: 50%;
      animation: splash-spin 1s linear infinite;
      margin-bottom: 24px;
    }

    .splash-text {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #759f90;
      animation: splash-pulse 2s ease-in-out infinite;
    }

    /* Desktop width removed - allow full width */
    @media (min-width: 1024px) {
      #root {
        max-width: 100%;
        width: 100%;
        height: 100dvh;
        margin: 0;
        overflow: hidden;
      }
    }
  </style>

</head>

<body>
  <div id="root">
    <!-- Inline splash: shown instantly while React JS loads -->
    <div class="splash-screen" id="inline-splash">
      <div class="splash-spinner"></div>
      <p class="splash-text">Sintonizando Frequência</p>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>

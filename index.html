<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://cdn-icons-png.flaticon.com/512/3209/3209931.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- SEO Básico -->
    <title>Viva360 - Ecossistema Holístico</title>
    <meta
      name="description"
      content="A maior plataforma de bem-estar holístico. Conecte-se com guardiões, santuários e sua própria essência."
    />
    <meta
      name="keywords"
      content="holístico, yoga, reiki, bem-estar, terapias, saúde mental"
    />

    <!-- PWA / Mobile -->
    <meta name="application-name" content="Viva360" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Viva360" />
    <link
      rel="apple-touch-icon"
      href="https://cdn-icons-png.flaticon.com/512/3209/3209931.png"
    />
    <meta name="theme-color" content="#263732" />

    <!-- Tailwind CSS is bundled by Vite/PostCSS - no CDN needed -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sab: env(safe-area-inset-bottom);
        --sat: env(safe-area-inset-top);
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #f4f7f5;
        color: #1a211d;
        overscroll-behavior-y: contain;
        overflow: hidden;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      @media (min-width: 1024px) {
        body {
          background-color: #e3ebe7;
        }
        #root {
          max-width: 100%;
          height: 100dvh;
          margin: 0;
        }
      }
    </style>
    <!-- Importmap removido pois entra em conflito com o bundle do Vite -->
    <!-- CSS is bundled by Vite into /assets/*.css -->
  </head>
  <body>
    <div id="root" class="w-full h-full bg-primary-50 overflow-hidden"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

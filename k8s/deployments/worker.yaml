apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: viva360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: viva360/backend:latest
        command: ["npm", "run", "dev:worker"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: viva360-secrets
              key: database-url
        - name: REDIS_HOST
          value: redis-master
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: viva360
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80

events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:3001;
    }
    upstream ritual_service {
        server ritual-service:3002;
    }
    upstream oracle_service {
        server oracle-service:3003;
    }
    upstream marketplace_service {
        server marketplace-service:3004;
    }
    upstream notification_service {
        server notification-service:3005;
    }

    server {
        listen 80;

        location /api/auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/profiles {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/rituals {
            proxy_pass http://ritual_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/oracle {
            proxy_pass http://oracle_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/marketplace {
            proxy_pass http://marketplace_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/checkout {
            proxy_pass http://marketplace_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check for the gateway itself
        location /health {
            return 200 '{"status":"ok", "service":"gateway"}';
        }
    }
}

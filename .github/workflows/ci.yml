name: CI — Lint · Type-check · Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Lint + Type-check (fast, no secrets needed)
  # ────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: 🔍 Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Generate feature contract catalog
        run: npm run qa:matrix && npm run qa:feature-contract-catalog

      - name: Enforce feature contract gate (unclassified == 0)
        run: npm run qa:feature-contract-gate

      - name: Enforce round-trip evidence gate (mixed/partial require explicit evidence or temporary allowlist)
        run: npm run qa:feature-contract-roundtrip-gate

      - name: Enforce mock refs count gate (threshold=420, meta <300)
        run: npm run qa:mock-refs-count-gate

      - name: Validate flow registry + warning gate
        run: npm run qa:validate-flow-registry && npm run qa:flow-registry-warn-gate

      - name: Audit mock references + gate
        run: npm run qa:audit-mock-refs && npm run qa:mock-ref-gate

      - name: Audit console usage + gate
        run: npm run qa:audit-console-usage && npm run qa:console-usage-gate

      - name: Audit setTimeout usage + gate
        run: npm run qa:audit-settimeout-usage && npm run qa:settimeout-usage-gate

      - name: Audit TODO/FIXME usage + gate
        run: npm run qa:audit-todo-usage && npm run qa:todo-usage-gate

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check frontend (tsc --noEmit)
        run: npm run typecheck:frontend

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Type-check backend (tsc --noEmit)
        working-directory: ./backend
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────
  # 2. Unit & Contract tests (vitest)
  # ────────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit & Contract Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NODE_ENV: test
      APP_MODE: MOCK
      ENABLE_TEST_MODE: "true"
      VITE_MOCK_ENABLED: "true"
      # Minimal fake values so code that reads these doesn't crash at import time
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-jwt-secret-not-used-in-real-auth"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run contract tests (checkout, auth, records, middleware)
        run: npm run test:contracts

      - name: Run OAuth redirect policy tests
        run: npm run test:oauth-policy

      - name: Run backend security tests
        run: npm run test:backend:security

      - name: Run full backend unit test suite
        run: npm run test:backend

      - name: Coverage thresholds by layer (services, controllers, flow)
        run: npm run test:coverage:layers

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-layers-${{ github.run_id }}
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # 3. Build verification (Vite + Prisma generate)
  # ────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NODE_ENV: production
      # Placeholder env vars so Vite build doesn't fail on missing imports
      VITE_SUPABASE_URL: "https://placeholder.supabase.co"
      VITE_SUPABASE_ANON_KEY: "placeholder-anon-key"
      VITE_APP_MODE: "PROD"
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Assert VITE_SENTRY_DSN is set
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: test -n "$VITE_SENTRY_DSN" || (echo "VITE_SENTRY_DSN is required for main build observability" && exit 1)

      - name: Build frontend (Vite)
        run: npx vite build

      - name: Verify bundle budget
        run: npm run perf:budget

      - name: Check for tracked secrets in bundle
        run: npm run qa:audit-tracked-secrets

  # ────────────────────────────────────────────────────────────────
  # 4. Schema drift check (requires real DB connection)
  # ────────────────────────────────────────────────────────────────
  schema-drift:
    name: 🗄️ Prisma Schema Drift
    runs-on: ubuntu-latest
    needs: build
    # Only run on main push (requires production secrets)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma migrations (main only)
        run: npm run db:migrate:deploy

      - name: Check schema drift
        run: npm run db:drift-check

  # ────────────────────────────────────────────────────────────────
  # 5. Smoke E2E (mock mode, no external services)
  # ────────────────────────────────────────────────────────────────
  smoke-e2e:
    name: 🎭 Critical QA Gate (Mock)
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    env:
      NODE_ENV: test
      VITE_APP_MODE: MOCK
      VITE_ENABLE_TEST_MODE: "true"
      VITE_MOCK_ENABLED: "true"
      APP_MODE: MOCK
      ENABLE_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run critical QA subset (LGPD + contracts + oracle + tribo)
        run: npm run test:qa:core:critical

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            qa/reports/playwright-report/
            qa/logs/
          retention-days: 7

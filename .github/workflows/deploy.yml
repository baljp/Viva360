name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + Deploy + Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate deploy secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing VERCEL_TOKEN secret" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID secret" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" | tail -n 1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $DEPLOY_URL"

      - name: Smoke test API and SPA
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Testing $URL"
          curl -fsS "$URL/" > /dev/null
          curl -fsS "$URL/api/ping" > /dev/null
          curl -fsS "$URL/api/health" > /dev/null
